name: "Setup GGAI"
description: "Install GGAI CLI globally"
runs:
  using: "composite"
  steps:
    - name: Install GGAI CLI
      run: curl -fsSL https://genesisgrid.ai/cli/install | bash
      shell: bash

    - name: Add GGAI to PATH
      run: echo "$HOME/.ggai/bin" >> $GITHUB_PATH
      shell: bash
