id = "ggai"
name = "Genesis Grid AI"
description = "The Genesis Grid AI coding agent."
version = "7.0.37"
schema_version = 1
authors = ["Genesis Grid AI Labs"]
repository = "https://github.com/genesisgrid/ggai"

[agent_servers.ggai]
name = "Genesis Grid AI"
icon = "./icons/opencode.svg"

[agent_servers.ggai.targets.darwin-aarch64]
archive = "https://github.com/genesisgrid/ggai/releases/download/v7.0.37/ggai-darwin-arm64.zip"
cmd = "./ggai"
args = ["acp"]

[agent_servers.ggai.targets.darwin-x86_64]
archive = "https://github.com/genesisgrid/ggai/releases/download/v7.0.37/ggai-darwin-x64.zip"
cmd = "./ggai"
args = ["acp"]

[agent_servers.ggai.targets.linux-aarch64]
archive = "https://github.com/genesisgrid/ggai/releases/download/v7.0.37/ggai-linux-arm64.tar.gz"
cmd = "./ggai"
args = ["acp"]

[agent_servers.ggai.targets.linux-x86_64]
archive = "https://github.com/genesisgrid/ggai/releases/download/v7.0.37/ggai-linux-x64.tar.gz"
cmd = "./ggai"
args = ["acp"]

[agent_servers.ggai.targets.windows-x86_64]
archive = "https://github.com/genesisgrid/ggai/releases/download/v7.0.37/ggai-windows-x64.zip"
cmd = "./ggai.exe"
args = ["acp"]
